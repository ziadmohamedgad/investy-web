<h2 mat-dialog-title>{{ data.mode === 'create' ? 'أصل جديد' : 'تعديل أصل' }}</h2>

<div mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="row">
      <mat-form-field appearance="outline" class="field">
        <mat-label>الرمز</mat-label>
        <input matInput formControlName="assetCode" placeholder="مثال: COMI" (input)="sanitizeTextControl('assetCode', true)" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>العملة</mat-label>
        <mat-select formControlName="currency">
          <mat-option *ngFor="let c of currencies" [value]="c">{{ c }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="field">
      <mat-label>الاسم</mat-label>
      <input matInput formControlName="assetName" placeholder="Example: Commercial International Bank" (input)="sanitizeTextControl('assetName')" />
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="field">
        <mat-label>النوع</mat-label>
        <mat-select formControlName="assetType">
          <mat-option *ngFor="let t of assetTypes" [value]="t.value">{{ t.label }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>الرمز الخارجي (اختياري)</mat-label>
        <input matInput formControlName="externalTicker" placeholder="مثال: COMI.CA" (input)="sanitizeTextControl('externalTicker', true)" />
      </mat-form-field>
    </div>

    <mat-checkbox formControlName="isActive">نشط</mat-checkbox>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">إلغاء</button>
  <button mat-raised-button color="primary" (click)="submit()">حفظ</button>
</div>
