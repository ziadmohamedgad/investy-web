<div class="layout-container">
  <aside class="sidebar">
    <div class="logo" routerLink="/dashboard" role="button" tabindex="0" aria-label="لوحة التحكم">
      <span class="text-gradient brand-name">إنڤيستي</span>
      <mat-icon>stacked_line_chart</mat-icon>
    </div>
    
    <div class="toggle-actions-row">
      <button mat-button (click)="toggleTheme()" class="glass-panel layout-toggle-button theme-toggle-button" style="flex: 1;">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ isDarkMode ? 'الوضع النهاري' : 'الوضع الليلي' }}</span>
      </button>
      <button
        mat-icon-button
        disableRipple
        (click)="toggleBalances()"
        class="glass-panel layout-toggle-button icon-toggle-button"
        [class.is-active]="hideBalances$ | async"
        [attr.aria-label]="(hideBalances$ | async) ? 'إظهار الأرصدة' : 'إخفاء الأرصدة'"
        [attr.title]="(hideBalances$ | async) ? 'إظهار الأرصدة' : 'إخفاء الأرصدة'">
        <mat-icon>{{ (hideBalances$ | async) ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </div>
    
    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">
        لوحة التحكم
        <mat-icon>dashboard</mat-icon>
      </a>
        <a routerLink="/assets-state" routerLinkActive="active">
          الأصول
          <mat-icon>inventory_2</mat-icon>
        </a>
      <a routerLink="/transactions" routerLinkActive="active">
        المعاملات
        <mat-icon>receipt_long</mat-icon>
      </a>
      <a routerLink="/settings" routerLinkActive="active">
        الإعدادات
        <mat-icon>settings</mat-icon>
      </a>
    </nav>
  </aside>

  <div class="main-content">
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
